<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>二维码生成器</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="keywords" content="二维码生成器,在线二维码,文本转二维码,网址二维码,QR Code">
<meta name="description" content="在线生成二维码，支持文本、网址、联系方式等内容生成二维码图片。">
<meta name="author" content="肖女士">

<style>
  :root {
    --bg: #f5f7fb;
    --card: rgba(255, 255, 255, 0.92);
    --text: #111827;
    --muted: #6b7280;
    --border: #e5e7eb;
    --primary: #6366f1;
    --primary-dark: #4f46e5;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --shadow: 0 20px 60px rgba(31, 41, 55, 0.12);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Microsoft YaHei", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at top left, rgba(99, 102, 241, 0.24), transparent 34%),
      radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.18), transparent 34%),
      var(--bg);
  }

  .page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .hero {
    padding: 46px 18px 92px;
    text-align: center;
    color: #fff;
    background: linear-gradient(135deg, #111827, #4f46e5, #10b981);
    background-size: 240% 240%;
    animation: gradientMove 9s ease infinite;
  }

  @keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .hero h1 {
    margin: 0 0 10px;
    font-size: clamp(28px, 5vw, 44px);
    letter-spacing: 0.04em;
  }

  .hero p {
    margin: 0;
    font-size: 16px;
    opacity: 0.92;
  }

  .wrap {
    width: min(1040px, calc(100% - 30px));
    margin: -60px auto 28px;
  }

  .generator {
    display: grid;
    grid-template-columns: minmax(0, 1.08fr) minmax(300px, 0.92fr);
    gap: 20px;
    align-items: stretch;
  }

  .card {
    background: var(--card);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.76);
    border-radius: 24px;
    padding: 24px;
    box-shadow: var(--shadow);
  }

  .section-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    margin-bottom: 18px;
  }

  .section-title h2 {
    margin: 0;
    font-size: 20px;
  }

  .status-chip {
    display: inline-flex;
    align-items: center;
    min-height: 28px;
    padding: 5px 11px;
    border-radius: 999px;
    font-size: 12px;
    color: var(--muted);
    background: #f3f4f6;
    white-space: nowrap;
  }

  .status-chip.success {
    color: #047857;
    background: rgba(16, 185, 129, 0.12);
  }

  .status-chip.warning {
    color: #92400e;
    background: rgba(245, 158, 11, 0.14);
  }

  .status-chip.error {
    color: #b91c1c;
    background: rgba(239, 68, 68, 0.12);
  }

  .field label {
    display: block;
    margin-bottom: 8px;
    font-size: 14px;
    color: var(--muted);
  }

  textarea,
  input {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px;
    font-size: 15px;
    font-family: inherit;
    color: var(--text);
    background: #fff;
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }

  textarea {
    min-height: 180px;
    line-height: 1.65;
    resize: vertical;
  }

  input {
    height: 46px;
  }

  textarea:focus,
  input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.13);
  }

  .meta-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 14px;
  }

  .helper {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-top: 8px;
    color: var(--muted);
    font-size: 13px;
  }

  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 18px;
  }

  button {
    font-family: inherit;
  }

  .btn {
    border: none;
    border-radius: 14px;
    min-height: 44px;
    padding: 0 18px;
    font-size: 14px;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease, opacity 0.2s ease;
  }

  .btn:hover:not(:disabled) {
    transform: translateY(-2px);
  }

  .btn:disabled {
    opacity: 0.56;
    cursor: not-allowed;
  }

  .btn-primary {
    color: #fff;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    box-shadow: 0 12px 24px rgba(99, 102, 241, 0.25);
  }

  .btn-light {
    color: var(--text);
    background: #f3f4f6;
  }

  .btn-success {
    color: #fff;
    background: linear-gradient(135deg, #10b981, #059669);
  }

  .preview-card {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .qr-box {
    min-height: 330px;
    border: 1px dashed #c7d2fe;
    border-radius: 22px;
    background:
      linear-gradient(135deg, rgba(99, 102, 241, 0.08), rgba(16, 185, 129, 0.08)),
      #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 18px;
    overflow: hidden;
  }

  .qr-empty {
    color: var(--muted);
    text-align: center;
    line-height: 1.7;
    padding: 20px;
  }

  .qr-image {
    display: block;
    width: min(280px, 100%);
    height: auto;
    border-radius: 14px;
    background: #fff;
    box-shadow: 0 12px 30px rgba(31, 41, 55, 0.12);
  }

  .tips {
    margin-top: 20px;
    padding: 16px 18px;
    border-radius: 18px;
    color: #374151;
    background: rgba(255, 255, 255, 0.72);
    border: 1px solid rgba(229, 231, 235, 0.82);
    line-height: 1.7;
    font-size: 14px;
  }

  .footer {
    margin-top: auto;
    padding: 22px 16px 28px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }

  .footer a {
    color: inherit;
    text-decoration: none;
  }

  @media (max-width: 840px) {
    .generator {
      grid-template-columns: 1fr;
    }

    .meta-row {
      grid-template-columns: 1fr;
    }

    .qr-box {
      min-height: 280px;
    }
  }
</style>
</head>
<body>
<div class="page">
  <header class="hero">
    <h1>二维码生成器</h1>
    <p>输入文本、网址或任意内容，自动生成二维码图片</p>
  </header>

  <main class="wrap">
    <section class="generator">
      <div class="card">
        <div class="section-title">
          <h2>输入二维码内容</h2>
          <span id="statusChip" class="status-chip">准备就绪</span>
        </div>

        <div class="field">
          <label for="qrText">文本内容</label>
          <textarea id="qrText" placeholder="请输入要生成二维码的内容，例如：https://www.xiaonvshi.com"></textarea>
          <div class="helper">
            <span>调整内容后会自动生成二维码</span>
            <span><strong id="charCount">0</strong> 字</span>
          </div>
        </div>

        <div class="meta-row">
          <div class="field">
            <label for="fileName">下载文件名</label>
            <input id="fileName" type="text" value="qrcode" placeholder="例如：my-qrcode">
          </div>
          <div class="field">
            <label for="sampleText">快速示例</label>
            <input id="sampleText" type="text" value="https://www.xiaonvshi.com" readonly>
          </div>
        </div>

        <div class="actions">
          <button id="generateBtn" class="btn btn-primary" type="button">生成二维码</button>
          <button id="sampleBtn" class="btn btn-light" type="button">填入示例</button>
          <button id="clearBtn" class="btn btn-light" type="button">清空</button>
        </div>
      </div>

      <div class="card preview-card">
        <div>
          <div class="section-title">
            <h2>二维码预览</h2>
          </div>

          <div id="qrBox" class="qr-box">
            <div class="qr-empty">二维码会显示在这里<br>输入内容后自动生成</div>
          </div>
        </div>

        <div class="actions">
          <button id="downloadBtn" class="btn btn-success" type="button" disabled>下载二维码</button>
        </div>
      </div>
    </section>

    <div class="tips">
      提示：二维码内容会通过接口参数传递，请勿输入密码、密钥、身份证号等敏感信息。
    </div>
  </main>

  <footer class="footer">
    &copy;<span id="year"></span> <a href="https://www.xiaonvshi.com" target="_blank" rel="noopener noreferrer">肖女士</a> 版权所有
  </footer>
</div>

<script>
  const API_URL = "https://api.mrwang.com/qr.php?text=";

  const yearEl = document.getElementById("year");
  const statusChip = document.getElementById("statusChip");
  const qrText = document.getElementById("qrText");
  const charCount = document.getElementById("charCount");
  const fileName = document.getElementById("fileName");
  const sampleText = document.getElementById("sampleText");
  const generateBtn = document.getElementById("generateBtn");
  const sampleBtn = document.getElementById("sampleBtn");
  const clearBtn = document.getElementById("clearBtn");
  const qrBox = document.getElementById("qrBox");
  const downloadBtn = document.getElementById("downloadBtn");

  let currentQrUrl = "";
  let autoGenerateTimer = null;

  yearEl.textContent = new Date().getFullYear();
  updateCharCount();

  qrText.addEventListener("input", function() {
    updateCharCount();
    scheduleAutoGenerate();
  });

  generateBtn.addEventListener("click", generateQrCode);
  sampleBtn.addEventListener("click", fillSample);
  clearBtn.addEventListener("click", clearAll);
  downloadBtn.addEventListener("click", downloadQrCode);

  qrText.addEventListener("keydown", function(event) {
    if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
      generateQrCode();
    }
  });

  function scheduleAutoGenerate() {
    clearTimeout(autoGenerateTimer);

    const text = qrText.value.trim();

    if (!text) {
      currentQrUrl = "";
      downloadBtn.disabled = true;
      setStatus("准备就绪", "");
      showEmpty("二维码会显示在这里<br>输入内容后自动生成");
      return;
    }

    setStatus("等待生成...", "warning");
    autoGenerateTimer = setTimeout(generateQrCode, 500);
  }

  function generateQrCode() {
    const text = qrText.value.trim();

    if (!text) {
      currentQrUrl = "";
      downloadBtn.disabled = true;
      setStatus("请输入内容", "warning");
      showEmpty("请输入要生成二维码的内容。");
      return;
    }

    currentQrUrl = API_URL + encodeURIComponent(text);
    setStatus("生成中...", "warning");
    downloadBtn.disabled = true;

    qrBox.innerHTML = "";

    const img = document.createElement("img");
    img.className = "qr-image";
    img.alt = "生成的二维码";
    img.src = currentQrUrl + "&_t=" + Date.now();

    img.onload = function() {
      setStatus("生成成功", "success");
      downloadBtn.disabled = false;
    };

    img.onerror = function() {
      currentQrUrl = "";
      setStatus("生成失败", "error");
      downloadBtn.disabled = true;
      showEmpty("二维码加载失败，请稍后重试。");
    };

    qrBox.appendChild(img);
  }

  function fillSample() {
    qrText.value = sampleText.value;
    updateCharCount();
    generateQrCode();
  }

  function clearAll() {
    qrText.value = "";
    currentQrUrl = "";
    clearTimeout(autoGenerateTimer);
    updateCharCount();
    downloadBtn.disabled = true;
    setStatus("已清空", "warning");
    showEmpty("二维码会显示在这里<br>输入内容后自动生成");
  }

  async function downloadQrCode() {
    if (!currentQrUrl) {
      setStatus("没有可下载图片", "warning");
      return;
    }

    setStatus("下载中...", "warning");

    try {
      const response = await fetch(currentQrUrl, { cache: "no-store" });

      if (!response.ok) {
        throw new Error("二维码图片下载失败");
      }

      const blob = await response.blob();
      const blobUrl = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = blobUrl;
      link.download = getSafeFileName(fileName.value) + ".png";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(blobUrl);

      setStatus("下载成功", "success");
    } catch (error) {
      const link = document.createElement("a");
      link.href = currentQrUrl;
      link.target = "_blank";
      link.rel = "noopener noreferrer";
      link.download = getSafeFileName(fileName.value) + ".png";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      setStatus("已打开图片", "warning");
    }
  }

  function updateCharCount() {
    charCount.textContent = qrText.value.length;
  }

  function showEmpty(html) {
    qrBox.innerHTML = "";
    const empty = document.createElement("div");
    empty.className = "qr-empty";
    empty.innerHTML = html;
    qrBox.appendChild(empty);
  }

  function setStatus(text, type) {
    statusChip.textContent = text;
    statusChip.className = "status-chip";

    if (type) {
      statusChip.classList.add(type);
    }
  }

  function getSafeFileName(value) {
    const name = String(value || "qrcode")
      .trim()
      .replace(/[\\/:*?"<>|]/g, "-")
      .replace(/\s+/g, "-");

    return name || "qrcode";
  }
</script>
</body>
</html>
